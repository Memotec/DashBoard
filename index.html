<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Enterprise Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #0f172a; --accent: #3b82f6;
            --danger: #ff4757; --success: #2ed573;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --bg-main: #f1f5f9;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            margin: 0; display: flex; height: 100vh; width: 100vw;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-main); overflow: hidden; 
        }

        /* Nút Menu cho Mobile */
        .menu-toggle {
            display: none; position: fixed; top: 15px; left: 15px;
            z-index: 100; background: var(--sidebar-bg); color: white;
            border: none; padding: 10px; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Sidebar - Đáp ứng linh hoạt */
        .sidebar { 
            width: 300px; min-width: 300px;
            background: var(--sidebar-bg); color: var(--text-main); 
            display: flex; flex-direction: column; z-index: 90;
        }

        .sidebar-header { padding: 30px 20px; text-align: center; }
        .sidebar-header h2 { margin: 0; font-size: 1.2rem; color: var(--accent); }

        .user-box { padding: 15px; margin: 0 15px 15px; background: rgba(255,255,255,0.05); border-radius: 12px; }
        #auth-btn { 
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px;
        }

        .admin-panel { margin: 0 15px 15px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; display: none; }
        .admin-panel input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        .admin-panel button { width: 100%; padding: 10px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .nav-list { flex-grow: 1; overflow-y: auto; padding: 10px 15px; }
        .app-item { display: flex; align-items: center; margin-bottom: 5px; border-radius: 10px; }
        .app-item:hover { background: #1e293b; }
        .nav-btn { flex-grow: 1; padding: 12px; border: none; background: none; color: var(--text-muted); text-align: left; cursor: pointer; }
        .app-item:hover .nav-btn { color: white; }
        .delete-btn { color: var(--danger); border: none; background: none; cursor: pointer; font-size: 1.2rem; padding: 0 15px; display: none; }

        /* Main View - Tự co giãn theo Sidebar */
        .main-view { flex-grow: 1; background: #fff; position: relative; width: 100%; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Welcome Screen */
        .welcome-screen {
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: white; text-align: center; padding: 20px;
        }

        /* ----- MEDIA QUERIES: ĐIỀU CHỈNH CHO MOBILE ----- */
        @media (max-width: 768px) {
            .menu-toggle { display: block; } /* Hiện nút Menu */

            .sidebar {
                position: fixed; left: -300px; top: 0; bottom: 0;
                transition: transform 0.3s ease-in-out;
            }

            /* Khi Sidebar được mở trên Mobile */
            .sidebar.active { transform: translateX(300px); }

            .main-view { border-radius: 0; }
            
            .welcome-screen h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Nút mở Menu cho điện thoại -->
    <button class="menu-toggle" onclick="toggleSidebar()">☰ Menu</button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>MY PORTAL</h2>
        </div>
        
        <div class="user-box">
            <div style="font-size: 0.8rem;"><span id="current-user">Guest Session</span></div>
            <button id="auth-btn" onclick="toggleLogin()">Admin Console</button>
        </div>

        <div id="admin-panel" class="admin-panel">
            <input type="text" id="app-name" placeholder="Tên ứng dụng">
            <input type="text" id="app-url" placeholder="URL (https://)">
            <button onclick="addApp()">Deploy App</button>
        </div>

        <div class="nav-list">
            <div id="app-list"></div>
        </div>
    </aside>

    <main class="main-view">
        <div id="welcome" class="welcome-screen">
            <h1>Workspace</h1>
            <p>Chọn ứng dụng để bắt đầu</p>
        </div>
        <iframe id="main-frame" name="app-viewport"></iframe>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5JH9LUptvUBH26H0Op_JKF3EWtQd4KNA",
            authDomain: "myportal-2ff0b.firebaseapp.com",
            projectId: "myportal-2ff0b",
            storageBucket: "myportal-2ff0b.firebasestorage.app",
            messagingSenderId: "171615684683",
            appId: "1:171615684683:web:ba4d1e3effa707defba5ce",
            measurementId: "G-37Y3SETGYT",
            databaseURL: "https://myportal-2ff0b-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const appsRef = ref(db, 'apps');

        let isAdmin = false;

        // Đóng/Mở Sidebar trên Mobile
        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
        };

        window.toggleLogin = () => {
            if (!isAdmin) {
                const pass = prompt("Master Key:");
                if (pass === "admin123") {
                    isAdmin = true;
                    document.getElementById('current-user').innerText = "Admin Access";
                    document.getElementById('auth-btn').innerText = "Logout";
                    document.getElementById('admin-panel').style.display = "block";
                }
            } else {
                isAdmin = false;
                document.getElementById('current-user').innerText = "Guest Session";
                document.getElementById('auth-btn').innerText = "Admin Login";
                document.getElementById('admin-panel').style.display = "none";
            }
            renderUI();
        };

        window.addApp = () => {
            const name = document.getElementById('app-name').value;
            const url = document.getElementById('app-url').value;
            if (name && url) {
                push(appsRef, { name, url });
                document.getElementById('app-name').value = '';
                document.getElementById('app-url').value = '';
            }
        };

        window.deleteApp = (id) => {
            if(confirm("Xóa ứng dụng này?")) remove(ref(db, 'apps/' + id));
        };

        window.openApp = (url) => {
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('main-frame').src = url;
            // Tự động đóng sidebar sau khi chọn app trên mobile
            if (window.innerWidth <= 768) toggleSidebar();
        };

        onValue(appsRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('app-list');
            list.innerHTML = "";
            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    const div = document.createElement('div');
                    div.className = 'app-item';
                    div.innerHTML = `
                        <button class="nav-btn" onclick="openApp('${item.url}')">${item.name}</button>
                        <button class="delete-btn" onclick="deleteApp('${key}')" style="display: ${isAdmin ? 'block' : 'none'}">×</button>
                    `;
                    list.appendChild(div);
                });
            }
        });

        function renderUI() {
            document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = isAdmin ? 'block' : 'none');
        }
    </script>
</body>
</html>
