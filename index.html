<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cloud Portal | Ultra Vivid</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f111a;
            --sidebar-bg: #161925;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            --accent-solid: #8b5cf6;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.05);
            --danger: #ff4757;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            margin: 0; display: flex; height: 100vh; width: 100vw;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-dark); overflow: hidden; color: var(--text-main);
        }

        /* Sidebar - Gọn gàng hơn */
        .sidebar { 
            width: 280px; min-width: 280px;
            background: var(--sidebar-bg); 
            display: flex; flex-direction: column; 
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }

        .sidebar-header { padding: 30px 25px; }
        .sidebar-header h2 { 
            margin: 0; font-size: 1.5rem; font-weight: 800; 
            background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* User & Admin */
        .user-panel { padding: 20px; margin: 0 15px 20px; background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        #auth-btn {
            width: 100%; background: var(--accent-gradient); color: white; border: none;
            padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }
        #auth-btn:hover { transform: scale(1.02); box-shadow: 0 15px 25px rgba(139, 92, 246, 0.4); }

        .admin-form { margin: 0 15px 20px; display: none; }
        .admin-form input { 
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px;
            border: 1px solid #334155; background: #000; color: white;
        }

        /* Workspace Area */
        .main-workspace { flex-grow: 1; position: relative; display: flex; flex-direction: column; }
        
        iframe { width: 100%; height: 100%; border: none; display: none; background: #fff; }

        /* Welcome Screen với lưới ứng dụng */
        #welcome-view {
            flex-grow: 1; overflow-y: auto; padding: 60px 40px;
            display: flex; flex-direction: column; align-items: center;
        }

        .welcome-header { text-align: center; margin-bottom: 50px; }
        .welcome-header h1 { font-size: 3rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .welcome-header p { color: var(--text-muted); font-size: 1.1rem; }

        /* Lưới ứng dụng ở Workspace */
        .app-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px; width: 100%; max-width: 1100px;
        }

        .app-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            padding: 30px 20px; border-radius: 24px; text-align: center;
            cursor: pointer; position: relative; overflow: hidden;
        }
        .app-card:hover {
            background: rgba(255,255,255,0.08); transform: translateY(-10px);
            border-color: var(--accent-solid);
        }
        .app-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--accent-gradient);
        }
        .app-icon { 
            width: 60px; height: 60px; background: rgba(139, 92, 246, 0.2); 
            border-radius: 18px; margin: 0 auto 15px; display: flex; 
            align-items: center; justify-content: center; font-size: 24px; color: var(--accent-solid);
        }
        .app-card h3 { margin: 0; font-size: 1.2rem; font-weight: 700; }

        .app-card .delete-btn {
            position: absolute; top: 10px; right: 10px; background: var(--danger);
            color: white; border: none; border-radius: 50%; width: 25px; height: 25px;
            cursor: pointer; display: none; font-weight: bold;
        }

        /* Sidebar Navigation (Dạng rút gọn) */
        .side-nav { padding: 10px 20px; }
        .side-item { 
            padding: 12px 15px; margin-bottom: 5px; border-radius: 10px; 
            cursor: pointer; color: var(--text-muted); font-size: 0.9rem;
        }
        .side-item:hover { background: rgba(255,255,255,0.05); color: white; }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { display: none; } /* Trên mobile ưu tiên Workspace */
            .welcome-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>MY PORTAL</h2>
        </div>
        
        <div class="user-panel">
            <div style="font-size: 0.8rem; margin-bottom: 10px; color: var(--text-muted);">
                Trạng thái: <span id="current-user" style="color: var(--success);">Guest</span>
            </div>
            <button id="auth-btn" onclick="toggleLogin()">Admin Login</button>
        </div>

        <div id="admin-panel" class="admin-form">
            <input type="text" id="app-name" placeholder="Tên dịch vụ">
            <input type="text" id="app-url" placeholder="URL (https://)">
            <button id="auth-btn" style="background: var(--accent-solid);" onclick="addApp()">+ Thêm ứng dụng</button>
        </div>

        <div class="side-nav" id="side-list">
            <div style="font-size: 0.7rem; font-weight: 800; color: #444; margin-bottom: 10px;">TRUY CẬP NHANH</div>
            <!-- Danh sách phụ hiện ở đây -->
        </div>
    </aside>

    <main class="main-workspace">
        <div id="welcome-view">
            <div class="welcome-header">
                <h1>DASHBOARD</h1>
                <p>Chọn ứng dụng bạn muốn làm việc hôm nay</p>
            </div>

            <div class="app-grid" id="app-grid">
                <!-- Danh sách chính hiển thị dạng Card ở đây -->
            </div>
        </div>

        <iframe id="main-frame" name="app-viewport"></iframe>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIREBASE CONFIG CỦA BẠN
        const firebaseConfig = {
            apiKey: "AIzaSyB5JH9LUptvUBH26H0Op_JKF3EWtQd4KNA",
            authDomain: "myportal-2ff0b.firebaseapp.com",
            projectId: "myportal-2ff0b",
            storageBucket: "myportal-2ff0b.firebasestorage.app",
            messagingSenderId: "171615684683",
            appId: "1:171615684683:web:ba4d1e3effa707defba5ce",
            measurementId: "G-37Y3SETGYT",
            databaseURL: "https://myportal-2ff0b-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const appsRef = ref(db, 'apps');

        let isAdmin = false;

        window.toggleLogin = () => {
            if (!isAdmin) {
                const pass = prompt("Admin Key:");
                if (pass === "admin123") {
                    isAdmin = true;
                    document.getElementById('current-user').innerText = "Administrator";
                    document.getElementById('auth-btn').innerText = "Logout Admin";
                    document.getElementById('admin-panel').style.display = "block";
                }
            } else {
                isAdmin = false;
                document.getElementById('current-user').innerText = "Guest";
                document.getElementById('auth-btn').innerText = "Admin Login";
                document.getElementById('admin-panel').style.display = "none";
            }
            renderApps();
        };

        window.addApp = () => {
            const name = document.getElementById('app-name').value;
            const url = document.getElementById('app-url').value;
            if (name && url) {
                push(appsRef, { name, url });
                document.getElementById('app-name').value = '';
                document.getElementById('app-url').value = '';
            }
        };

        window.deleteApp = (e, id) => {
            e.stopPropagation(); // Ngăn việc mở app khi nhấn xóa
            if(confirm("Xóa ứng dụng này?")) remove(ref(db, 'apps/' + id));
        };

        window.openApp = (url) => {
            document.getElementById('welcome-view').style.display = 'none';
            const frame = document.getElementById('main-frame');
            frame.style.display = 'block';
            frame.src = url;
        };

        // Đồng bộ dữ liệu hiển thị cả 2 nơi: Sidebar và Workspace Grid
        onValue(appsRef, (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('app-grid');
            const sideList = document.getElementById('side-list');
            
            grid.innerHTML = "";
            sideList.innerHTML = `<div style="font-size: 0.7rem; font-weight: 800; color: #444; margin-bottom: 10px;">TRUY CẬP NHANH</div>`;

            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    
                    // Thêm vào Workspace Grid
                    const card = document.createElement('div');
                    card.className = 'app-card';
                    card.onclick = () => openApp(item.url);
                    card.innerHTML = `
                        <button class="delete-btn" onclick="deleteApp(event, '${key}')" style="display: ${isAdmin ? 'block' : 'none'}">×</button>
                        <div class="app-icon">${item.name.charAt(0).toUpperCase()}</div>
                        <h3>${item.name}</h3>
                    `;
                    grid.appendChild(card);

                    // Thêm vào Sidebar phụ
                    const sideItem = document.createElement('div');
                    sideItem.className = 'side-item';
                    sideItem.innerText = item.name;
                    sideItem.onclick = () => openApp(item.url);
                    sideList.appendChild(sideItem);
                });
            }
        });
    </script>
</body>
</html>
