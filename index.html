<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Cloud Portal | Premium v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --danger: #ff4757;
            --success: #2ed573;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bg-main: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            margin: 0; display: flex; height: 100vh; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-main); overflow: hidden; 
        }

        /* Sidebar - Sang trọng hơn */
        .sidebar { 
            width: 300px; 
            background: var(--sidebar-bg); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .sidebar-header { 
            padding: 40px 25px; 
            text-align: left;
        }

        .sidebar-header h2 { 
            margin: 0; font-size: 1.4rem; font-weight: 700; 
            letter-spacing: -0.5px; color: #fff;
            display: flex; align-items: center; gap: 10px;
        }

        .sidebar-header h2::before {
            content: ''; width: 12px; height: 12px; 
            background: var(--accent); border-radius: 3px;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Auth Section - Bo góc hiện đại */
        .user-box { 
            padding: 20px; margin: 0 20px 20px; 
            background: var(--glass); 
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }

        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .status-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }
        #current-user { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); }

        #auth-btn {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 12px; border-radius: 10px; cursor: pointer; 
            font-size: 0.9rem; font-weight: 600; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        #auth-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }

        /* Admin Form - Giao diện nhập liệu sạch sẽ */
        .admin-panel { 
            margin: 0 20px 25px; padding: 20px; 
            background: rgba(0,0,0,0.2); border-radius: 16px;
            display: none; border: 1px solid rgba(255,255,255,0.05);
        }

        .admin-panel input { 
            width: 100%; padding: 12px; margin-bottom: 12px; 
            border-radius: 10px; border: 1px solid #334155; 
            background: #0f172a; color: white; font-size: 0.85rem;
        }

        .admin-panel input:focus { border-color: var(--accent); outline: none; background: #1e293b; }

        .admin-panel button { 
            width: 100%; padding: 12px; background: var(--success); 
            color: white; border: none; cursor: pointer; border-radius: 10px; font-weight: 700;
        }

        /* App List - Hiệu ứng Hover mượt */
        .nav-list { flex-grow: 1; overflow-y: auto; padding: 0 20px 20px; }
        .label { font-size: 0.7rem; color: var(--text-muted); font-weight: 800; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; }

        .app-item { 
            display: flex; align-items: center; margin-bottom: 8px; 
            border-radius: 12px; position: relative;
        }
        .app-item:hover { background: var(--sidebar-hover); transform: translateX(5px); }

        .nav-btn { 
            flex-grow: 1; padding: 14px 15px; border: none; background: none; 
            color: var(--text-muted); text-align: left; cursor: pointer; font-size: 0.95rem; font-weight: 500;
        }
        .app-item:hover .nav-btn { color: #fff; }

        .delete-btn { 
            color: var(--danger); border: none; background: none; 
            cursor: pointer; font-size: 1.2rem; padding: 0 15px; display: none;
            opacity: 0.5;
        }
        .delete-btn:hover { opacity: 1; color: #ff6b81; }

        /* Main Content - Cửa sổ trình duyệt */
        .main-view { flex-grow: 1; background: #fff; position: relative; border-radius: 30px 0 0 30px; margin-left: -20px; overflow: hidden; box-shadow: -15px 0 40px rgba(0,0,0,0.1); }
        iframe { width: 100%; height: 100%; border: none; }

        /* Empty state */
        .welcome-screen {
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #fff; color: #1e293b;
        }
        .welcome-screen h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>MY PORTAL</h2>
        </div>
        
        <div class="user-box">
            <div class="user-info">
                <span class="status-dot"></span>
                <span id="current-user">Guest Session</span>
            </div>
            <button id="auth-btn" onclick="toggleLogin()">Admin Console</button>
        </div>

        <div id="admin-panel" class="admin-panel">
            <input type="text" id="app-name" placeholder="Application Name">
            <input type="text" id="app-url" placeholder="Endpoint URL (https://)">
            <button onclick="addApp()">🚀 Deploy App</button>
        </div>

        <div class="nav-list">
            <div class="label">Available Services</div>
            <div id="app-list">
                <!-- Data from Firebase -->
            </div>
        </div>
    </aside>

    <main class="main-view">
        <div id="welcome" class="welcome-screen">
            <h1>Workspace</h1>
            <p style="color: #64748b;">Vui lòng chọn ứng dụng từ menu để bắt đầu</p>
        </div>
        <iframe id="main-frame" name="app-viewport"></iframe>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // GIỮ NGUYÊN CONFIG CỦA BẠN
        const firebaseConfig = {
            apiKey: "AIzaSyB5JH9LUptvUBH26H0Op_JKF3EWtQd4KNA",
            authDomain: "myportal-2ff0b.firebaseapp.com",
            projectId: "myportal-2ff0b",
            storageBucket: "myportal-2ff0b.firebasestorage.app",
            messagingSenderId: "171615684683",
            appId: "1:171615684683:web:ba4d1e3effa707defba5ce",
            measurementId: "G-37Y3SETGYT",
            databaseURL: "https://myportal-2ff0b-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const appsRef = ref(db, 'apps');

        let isAdmin = false;

        // Logic Đăng nhập
        window.toggleLogin = () => {
            if (!isAdmin) {
                const pass = prompt("Enter Master Key:");
                if (pass === "admin123") {
                    isAdmin = true;
                    document.getElementById('current-user').innerText = "System Admin";
                    document.getElementById('auth-btn').innerText = "Exit Admin";
                    document.getElementById('admin-panel').style.display = "block";
                } else { alert("Access Denied!"); }
            } else {
                isAdmin = false;
                document.getElementById('current-user').innerText = "Guest Session";
                document.getElementById('auth-btn').innerText = "Admin Console";
                document.getElementById('admin-panel').style.display = "none";
            }
            renderUIStatus();
        };

        // Logic thêm App
        window.addApp = () => {
            const name = document.getElementById('app-name').value;
            const url = document.getElementById('app-url').value;
            if (name && url) {
                push(appsRef, { name, url });
                document.getElementById('app-name').value = '';
                document.getElementById('app-url').value = '';
            }
        };

        // Logic xóa App
        window.deleteApp = (id) => {
            if(confirm("Xóa dịch vụ này khỏi hệ thống?")) {
                remove(ref(db, 'apps/' + id));
            }
        };

        // Đồng bộ dữ liệu Realtime
        onValue(appsRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('app-list');
            list.innerHTML = "";
            if (data) {
                Object.keys(data).forEach(key => {
                    const appData = data[key];
                    const div = document.createElement('div');
                    div.className = 'app-item';
                    div.innerHTML = `
                        <button class="nav-btn" onclick="openApp('${appData.url}')">
                            ${appData.name}
                        </button>
                        <button class="delete-btn" onclick="deleteApp('${key}')" style="display: ${isAdmin ? 'block' : 'none'}">×</button>
                    `;
                    list.appendChild(div);
                });
            }
        });

        window.openApp = (url) => {
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('main-frame').src = url;
        };

        function renderUIStatus() {
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.style.display = isAdmin ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
