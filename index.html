<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise App Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bg-main: #f1f5f9;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg-main); color: #334155; }
        
        /* Sidebar Chuyên nghiệp */
        .sidebar { 
            width: 300px; 
            background: var(--sidebar-bg); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .sidebar-header { 
            padding: 30px 20px; 
            text-align: center; 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .sidebar-header h2 { 
            margin: 0; font-size: 1.2rem; letter-spacing: 1px; font-weight: 600; color: var(--accent); 
        }

        /* Thông tin User & Auth */
        .user-info { 
            padding: 15px 20px; 
            background: rgba(255,255,255,0.05); 
            margin: 10px; 
            border-radius: 12px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .user-status { font-size: 0.85rem; font-weight: 500; }
        
        #auth-btn {
            background: var(--accent); color: white; border: none;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem;
        }

        #auth-btn:hover { background: var(--accent-hover); }

        /* Admin Panel Card */
        .admin-controls { 
            margin: 10px; padding: 15px; 
            background: #1e293b; border-radius: 12px;
            display: none; border: 1px solid #334155;
        }

        .admin-controls input { 
            width: 100%; padding: 10px; margin-bottom: 10px; 
            border-radius: 8px; border: 1px solid #334155; 
            background: #0f172a; color: white; outline: none;
        }

        .admin-controls input:focus { border-color: var(--accent); }

        .admin-controls button { 
            width: 100%; padding: 10px; background: #10b981; 
            color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: 600;
        }

        /* App List */
        .nav-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .list-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; text-transform: uppercase; }

        .app-item { 
            display: flex; align-items: center; margin-bottom: 8px; 
            background: transparent; border-radius: 10px;
        }

        .app-item:hover { background: var(--sidebar-hover); }

        .nav-btn { 
            flex-grow: 1; padding: 12px 15px; border: none; background: none; 
            color: var(--text-muted); text-align: left; cursor: pointer; font-size: 0.95rem;
        }

        .app-item:hover .nav-btn { color: white; }

        .delete-btn { 
            color: var(--danger); border: none; background: none; 
            cursor: pointer; font-size: 1.2rem; padding-right: 15px; display: none; opacity: 0.6;
        }
        .delete-btn:hover { opacity: 1; transform: scale(1.2); }

        /* Khung hiển thị App chính */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Hiệu ứng loading giả lập */
        .iframe-container { width: 100%; height: 100%; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>DASHBOARD PRO</h2>
        </div>
        
        <div class="user-info">
            <span class="user-status" id="current-user">Guest Access</span>
            <button id="auth-btn" onclick="toggleLogin()">Login</button>
        </div>

        <div id="admin-panel" class="admin-controls">
            <input type="text" id="app-name" placeholder="App Name...">
            <input type="text" id="app-url" placeholder="http://...">
            <button onclick="addApp()">Deploy App</button>
        </div>

        <div class="nav-list">
            <div class="list-label">Available Applications</div>
            <div id="app-list">
                </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="iframe-container">
            <iframe id="main-frame" src="about:blank" name="app-viewport"></iframe>
        </div>
    </main>

    <script>
        // --- LOGIC GIỮ NGUYÊN NHƯ BẢN TRƯỚC ---
        let isAdmin = false;
        let apps = JSON.parse(localStorage.getItem('myApps')) || [
            { name: "Google", url: "https://www.bing.com" } // Ví dụ mẫu
        ];

        function init() { renderApps(); }

        function toggleLogin() {
            if (!isAdmin) {
                let user = prompt("User:");
                let pass = prompt("Password:");
                if (user === "admin" && pass === "admin") {
                    isAdmin = true;
                    document.getElementById('current-user').innerText = "Administrator";
                    document.getElementById('auth-btn').innerText = "Logout";
                    document.getElementById('admin-panel').style.display = "block";
                } else { alert("Access Denied!"); }
            } else {
                isAdmin = false;
                document.getElementById('current-user').innerText = "Guest Access";
                document.getElementById('auth-btn').innerText = "Login";
                document.getElementById('admin-panel').style.display = "none";
            }
            renderApps();
        }

        function addApp() {
            const name = document.getElementById('app-name').value;
            const url = document.getElementById('app-url').value;
            if (name && url) {
                apps.push({ name, url });
                localStorage.setItem('myApps', JSON.stringify(apps));
                renderApps();
                document.getElementById('app-name').value = '';
                document.getElementById('app-url').value = '';
            }
        }

        function deleteApp(index) {
            if(confirm("Confirm removal?")) {
                apps.splice(index, 1);
                localStorage.setItem('myApps', JSON.stringify(apps));
                renderApps();
            }
        }

        function renderApps() {
            const list = document.getElementById('app-list');
            list.innerHTML = "";
            apps.forEach((app, index) => {
                const div = document.createElement('div');
                div.className = 'app-item';
                div.innerHTML = `
                    <button class="nav-btn" onclick="document.getElementById('main-frame').src='${app.url}'">
                        ● &nbsp; ${app.name}
                    </button>
                    <button class="delete-btn" onclick="deleteApp(${index})" style="display: ${isAdmin ? 'block' : 'none'}">×</button>
                `;
                list.appendChild(div);
            });
        }
        init();
    </script>
</body>
