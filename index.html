<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise App Portal | Premium Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette màu sắc chuyên nghiệp */
            --sidebar-width: 280px;
            --primary: #4f46e5; /* Indigo */
            --primary-hover: #4338ca;
            --bg-sidebar: #ffffff;
            --bg-main: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            margin: 0; display: flex; height: 100vh; width: 100vw;
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-main); overflow: hidden; color: var(--text-dark);
        }

        /* Sidebar hiện đại */
        .sidebar { 
            width: var(--sidebar-width); 
            background: var(--bg-sidebar); 
            display: flex; flex-direction: column; 
            border-right: 1px solid var(--border);
            z-index: 100;
        }

        .sidebar-header { 
            padding: 32px 24px; 
            display: flex; align-items: center; gap: 12px;
        }

        .logo-box {
            width: 32px; height: 32px; background: var(--primary);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .sidebar-header h2 { 
            margin: 0; font-size: 1.1rem; font-weight: 700; color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        /* User Profile Section */
        .user-section { 
            padding: 16px; margin: 0 16px 24px; 
            background: var(--bg-main); border-radius: 12px;
            border: 1px solid var(--border);
        }

        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .status-indicator { width: 8px; height: 8px; background: var(--success); border-radius: 50%; }
        #current-user { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); }

        #auth-btn {
            width: 100%; background: #ffffff; color: var(--text-dark); 
            border: 1px solid var(--border); padding: 8px; border-radius: 8px; 
            cursor: pointer; font-size: 0.85rem; font-weight: 600;
        }
        #auth-btn:hover { background: var(--text-dark); color: white; border-color: var(--text-dark); }

        /* Admin Controls */
        .admin-controls { 
            margin: 0 16px 24px; padding: 16px; 
            background: #f1f5f9; border-radius: 12px; display: none;
        }

        .admin-controls input { 
            width: 100%; padding: 10px; margin-bottom: 8px; 
            border-radius: 8px; border: 1px solid var(--border); 
            font-size: 0.85rem; outline: none;
        }

        .admin-controls input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .admin-controls button { 
            width: 100%; padding: 10px; background: var(--primary); 
            color: white; border: none; border-radius: 8px; 
            font-weight: 600; cursor: pointer; font-size: 0.85rem;
        }

        /* Navigation List */
        .nav-container { flex-grow: 1; overflow-y: auto; padding: 0 16px 24px; }
        .nav-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

        .app-item { 
            display: flex; align-items: center; margin-bottom: 4px; 
            border-radius: 8px; 
        }

        .app-item:hover { background: #f1f5f9; }

        .nav-btn { 
            flex-grow: 1; padding: 10px 12px; border: none; background: none; 
            color: var(--text-muted); text-align: left; cursor: pointer; 
            font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 10px;
        }

        .app-item:hover .nav-btn { color: var(--text-dark); }

        .delete-btn { 
            color: var(--text-muted); border: none; background: none; 
            cursor: pointer; font-size: 1.1rem; padding: 0 12px; display: none;
        }
        .delete-btn:hover { color: var(--danger); }

        /* Main Workspace Area */
        .workspace { flex-grow: 1; display: flex; flex-direction: column; background: #ffffff; }
        
        iframe { width: 100%; height: 100%; border: none; background: #ffffff; }

        /* Empty State */
        .welcome-view {
            height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
            padding: 40px; color: var(--text-muted);
        }
        .welcome-view h1 { color: var(--text-dark); font-size: 1.8rem; margin-bottom: 8px; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { 
                position: fixed; left: -100%; height: 100%; 
                box-shadow: 20px 0 50px rgba(0,0,0,0.1); 
            }
            .sidebar.active { left: 0; }
            .mobile-header { display: flex !important; }
        }

        .mobile-header {
            display: none; height: 60px; background: white; 
            align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border);
        }
        .menu-icon { font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">P</div>
            <h2>MY PORTAL</h2>
        </div>
        
        <div class="user-section">
            <div class="user-info">
                <div class="status-indicator"></div>
                <span id="current-user">Guest Session</span>
            </div>
            <button id="auth-btn" onclick="toggleLogin()">Admin Login</button>
        </div>

        <div id="admin-panel" class="admin-controls">
            <input type="text" id="app-name" placeholder="App Name (e.g. Google)">
            <input type="text" id="app-url" placeholder="URL (https://...)">
            <button onclick="addApp()">+ Deploy App</button>
        </div>

        <nav class="nav-container">
            <div class="nav-label">Applications</div>
            <div id="app-list">
                <!-- Data will be loaded here -->
            </div>
        </nav>
    </aside>

    <main class="workspace">
        <div class="mobile-header">
            <div class="menu-icon" onclick="toggleSidebar()">☰</div>
            <div style="flex-grow: 1; text-align: center; font-weight: 700;">WORKSPACE</div>
        </div>

        <div id="welcome" class="welcome-view">
            <div style="font-size: 48px; margin-bottom: 20px;">📂</div>
            <h1>Ready to Launch</h1>
            <p>Chọn một ứng dụng từ menu bên trái để bắt đầu phiên làm việc.</p>
        </div>
        
        <iframe id="main-frame" name="app-viewport"></iframe>
    </main>

    <script type="module">
        // --- GIỮ NGUYÊN LOGIC FIREBASE CỦA BẠN ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config (Dữ liệu của bạn)
        const firebaseConfig = {
            apiKey: "AIzaSyB5JH9LUptvUBH26H0Op_JKF3EWtQd4KNA",
            authDomain: "myportal-2ff0b.firebaseapp.com",
            projectId: "myportal-2ff0b",
            storageBucket: "myportal-2ff0b.firebasestorage.app",
            messagingSenderId: "171615684683",
            appId: "1:171615684683:web:ba4d1e3effa707defba5ce",
            measurementId: "G-37Y3SETGYT",
            databaseURL: "https://myportal-2ff0b-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const appsRef = ref(db, 'apps');

        let isAdmin = false;

        // Xử lý Sidebar Mobile
        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
        };

        // Đăng nhập
        window.toggleLogin = () => {
            if (!isAdmin) {
                const pass = prompt("Enter Admin Password:");
                if (pass === "admin123") {
                    isAdmin = true;
                    document.getElementById('current-user').innerText = "Administrator";
                    document.getElementById('auth-btn').innerText = "Logout";
                    document.getElementById('admin-panel').style.display = "block";
                }
            } else {
                isAdmin = false;
                document.getElementById('current-user').innerText = "Guest Session";
                document.getElementById('auth-btn').innerText = "Admin Login";
                document.getElementById('admin-panel').style.display = "none";
            }
            updateUI();
        };

        // Thêm App
        window.addApp = () => {
            const name = document.getElementById('app-name').value;
            const url = document.getElementById('app-url').value;
            if (name && url) {
                push(appsRef, { name, url });
                document.getElementById('app-name').value = '';
                document.getElementById('app-url').value = '';
            }
        };

        // Xóa App
        window.deleteApp = (id) => {
            if(confirm("Confirm removal?")) remove(ref(db, 'apps/' + id));
        };

        // Mở App
        window.loadApp = (url) => {
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('main-frame').src = url;
            if (window.innerWidth <= 768) toggleSidebar();
        };

        // Render dữ liệu
        onValue(appsRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('app-list');
            list.innerHTML = "";
            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    const div = document.createElement('div');
                    div.className = 'app-item';
                    div.innerHTML = `
                        <button class="nav-btn" onclick="loadApp('${item.url}')">
                            <span style="opacity: 0.5;">•</span> ${item.name}
                        </button>
                        <button class="delete-btn" onclick="deleteApp('${key}')" style="display: ${isAdmin ? 'block' : 'none'}">×</button>
                    `;
                    list.appendChild(div);
                });
            }
        });

        function updateUI() {
            document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = isAdmin ? 'block' : 'none');
        }
    </script>
</body>
</html>
