<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Cloud Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #0f172a; --sidebar-hover: #1e293b;
            --accent: #3b82f6; --accent-hover: #2563eb;
            --danger: #ef4444; --text-main: #f8fafc;
            --text-muted: #94a3b8; --bg-main: #f1f5f9;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg-main); overflow: hidden; }
        .sidebar { width: 280px; background: var(--sidebar-bg); color: var(--text-main); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 25px 20px; text-align: center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header h2 { margin: 0; font-size: 1.1rem; color: var(--accent); }
        .user-box { padding: 15px; margin: 15px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 5px; }
        #auth-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .admin-panel { margin: 0 15px 15px 15px; padding: 15px; background: #1e293b; border-radius: 10px; display: none; }
        .admin-panel input { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
        .admin-panel button { width: 100%; padding: 8px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .nav-list { flex-grow: 1; overflow-y: auto; padding: 10px 15px; }
        .app-item { display: flex; align-items: center; margin-bottom: 5px; border-radius: 8px; }
        .app-item:hover { background: var(--sidebar-hover); }
        .nav-btn { flex-grow: 1; padding: 12px; border: none; background: none; color: var(--text-muted); text-align: left; cursor: pointer; font-size: 0.9rem; }
        .app-item:hover .nav-btn { color: white; }
        .delete-btn { color: var(--danger); border: none; background: none; cursor: pointer; font-size: 1.1rem; padding: 0 15px; display: none; }
        .main-view { flex-grow: 1; position: relative; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header"><h2>MY PORTAL</h2></div>
        <div class="user-box">
            <div style="font-size: 0.75rem;"><span class="status-dot"></span><span id="current-user">Guest Mode</span></div>
            <button id="auth-btn" onclick="toggleLogin()">Admin Login</button>
        </div>
        <div id="admin-panel" class="admin-panel">
            <input type="text" id="app-name" placeholder="Tên ứng dụng...">
            <input type="text" id="app-url" placeholder="https://...">
            <button onclick="addApp()">Deploy to Cloud</button>
        </div>
        <div class="nav-list">
            <div style="font-size: 0.65rem; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 1px;">WORKSPACE</div>
            <div id="app-list"></div>
        </div>
    </aside>

    <main class="main-view">
        <iframe id="main-frame" src="about:blank"></iframe>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- Firebase Config của bạn ---
        const firebaseConfig = {
            apiKey: "AIzaSyB5JH9LUptvUBH26H0Op_JKF3EWtQd4KNA",
            authDomain: "myportal-2ff0b.firebaseapp.com",
            projectId: "myportal-2ff0b",
            storageBucket: "myportal-2ff0b.firebasestorage.app",
            messagingSenderId: "171615684683",
            appId: "1:171615684683:web:ba4d1e3effa707defba5ce",
            measurementId: "G-37Y3SETGYT",
            databaseURL: "https://myportal-2ff0b-default-rtdb.asia-southeast1.firebasedatabase.app/" // Thêm URL Database
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const appsRef = ref(db, 'apps');

        let isAdmin = false;

        // Quản lý đăng nhập
        window.toggleLogin = () => {
            if (!isAdmin) {
                const pass = prompt("Nhập mật khẩu Admin:");
                if (pass === "admin123") {
                    isAdmin = true;
                    document.getElementById('current-user').innerText = "Administrator";
                    document.getElementById('auth-btn').innerText = "Logout";
                    document.getElementById('admin-panel').style.display = "block";
                } else { alert("Sai mật khẩu!"); }
            } else {
                isAdmin = false;
                document.getElementById('current-user').innerText = "Guest Mode";
                document.getElementById('auth-btn').innerText = "Admin Login";
                document.getElementById('admin-panel').style.display = "none";
            }
            renderApps([]); // Refresh nút delete
        };

        // Thêm app
        window.addApp = () => {
            const name = document.getElementById('app-name').value;
            const url = document.getElementById('app-url').value;
            if (name && url) {
                push(appsRef, { name, url });
                document.getElementById('app-name').value = '';
                document.getElementById('app-url').value = '';
            }
        };

        // Xóa app
        window.deleteApp = (id) => {
            if(confirm("Xóa ứng dụng này?")) {
                remove(ref(db, 'apps/' + id));
            }
        };

        // Lắng nghe dữ liệu realtime
        onValue(appsRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('app-list');
            list.innerHTML = "";
            if (data) {
                Object.keys(data).forEach(key => {
                    const appData = data[key];
                    const div = document.createElement('div');
                    div.className = 'app-item';
                    div.innerHTML = `
                        <button class="nav-btn" onclick="document.getElementById('main-frame').src='${appData.url}'">
                            ● &nbsp; ${appData.name}
                        </button>
                        <button class="delete-btn" onclick="deleteApp('${key}')" style="display: ${isAdmin ? 'block' : 'none'}">×</button>
                    `;
                    list.appendChild(div);
                });
            }
        });
    </script>
</body>
</html>
